<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galfus WASM Demo</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1115;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        place-items: center;
        gap: 24px;
        text-align: center;
      }
      header {
        display: grid;
        gap: 8px;
      }
      nav {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      nav a {
        color: #e6e6e6;
        text-decoration: none;
        padding: 6px 10px;
        border: 1px solid #2b2f36;
        border-radius: 6px;
      }
      nav a:hover {
        border-color: #4c566a;
      }
      canvas#galfus-canvas {
        width: min(1024px, 92vw);
        height: min(640px, 60vh);
        border: 1px solid #2b2f36;
        background: #0b0d12;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Galfus WASM Demos</h1>
        <p>Escolha um demo e veja o canvas abaixo.</p>
        <nav>
          <a href="#demo-001">Demo 001</a>
          <a href="#demo-002">Demo 002</a>
          <a href="#demo-003">Demo 003</a>
          <a href="#demo-004">Demo 004</a>
          <a href="#demo-005">Demo 005</a>
          <a href="#demo-006">Demo 006</a>
        </nav>
      </header>
      <canvas id="galfus-canvas"></canvas>
    </div>
    <script type="module" src="/src/wasm/main.ts"></script>
  </body>
</html>
