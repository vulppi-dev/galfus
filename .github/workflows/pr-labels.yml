name: PR Labels and Validate

on:
  pull_request_target:
    branches:
      - main
      - dev/**
      - stable/**
      - alpha/**
      - beta/**
      - release/**
    types:
      - opened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Label PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          xs_label: size/xs
          xs_max_size: '30'
          s_label: size/sm
          s_max_size: '100'
          m_label: size/md
          m_max_size: '300'
          l_label: size/lg
          l_max_size: '800'
          xl_label: size/xl
          fail_if_xl: 'false'
          github_api_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog labels from checked checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const managed = new Set([
              "changelog:breaking",
              "changelog:feature",
              "changelog:fix",
              "changelog:performance",
              "changelog:docs",
              "changelog:internal",
            ]);

            const checked = new Set();
            const body = pr.body || "";
            const checkedPattern = /-\s*\[(x|X)\]\s*`([^`]+)`/g;
            let match;
            while ((match = checkedPattern.exec(body)) !== null) {
              const label = match[2].trim();
              if (managed.has(label)) checked.add(label);
            }

            const currentPrLabels = new Set(pr.labels.map((label) => label.name));
            const existingRepoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );
            const repoLabelSet = new Set(existingRepoLabels.map((label) => label.name));

            const toAdd = [...checked].filter(
              (label) => repoLabelSet.has(label) && !currentPrLabels.has(label)
            );
            const toRemove = [...managed].filter(
              (label) =>
                repoLabelSet.has(label) &&
                currentPrLabels.has(label) &&
                !checked.has(label)
            );

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: toAdd,
              });
            }

            for (const label of toRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label,
              });
            }

            core.info(`changelog labels added=[${toAdd.join(", ")}], removed=[${toRemove.join(", ")}]`);

  validate:
    name: PR Validate
    needs:
      - labels
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate PR policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request payload found.');
              return;
            }

            const errors = [];

            const title = (pr.title || '').trim();
            const semanticTitle = /^(feat|fix|perf|docs|chore|refactor|test|build|ci)(\([^)]+\))?!?:\s+.+$/;
            if (!semanticTitle.test(title)) {
              errors.push(
                'Invalid PR title. Use semantic format: type(scope): summary (types: feat, fix, perf, docs, chore, refactor, test, build, ci).'
              );
            }

            const body = (pr.body || '').toLowerCase();
            const issuePatterns = [
              /\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+\b/i,
              /\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+\b/i,
            ];
            if (!issuePatterns.some((re) => re.test(body))) {
              errors.push("Missing linked issue in PR body. Add e.g. 'Closes #123'.");
            }

            const allowedChangelog = new Set([
              'changelog:breaking',
              'changelog:feature',
              'changelog:fix',
              'changelog:performance',
              'changelog:docs',
              'changelog:internal',
            ]);
            const labels = pr.labels.map((l) => l.name);
            if (!labels.some((name) => allowedChangelog.has(name))) {
              errors.push('Missing changelog label. Add one of: ' + [...allowedChangelog].join(', '));
            }

            const baseRef = pr.base.ref;
            const headRef = pr.head.ref;
            const isPromotionBase =
              /^alpha\/.+$/.test(baseRef) ||
              /^beta\/.+$/.test(baseRef) ||
              /^release\/.+$/.test(baseRef);

            if (isPromotionBase) {
              const isMain = headRef === 'main';
              const isStable = /^stable\/.+$/.test(headRef);
              if (!isMain && !isStable) {
                errors.push(
                  `Invalid promotion source "${headRef}". Allowed sources for ${baseRef}: main or stable/*`
                );
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.map((msg) => `- ${msg}`).join('\n'));
            }
