name: PR Labels

on:
  pull_request_target:
    branches:
      - main
      - dev/**
      - stable/**
      - alpha/**
      - beta/**
      - release/**
    types:
      - opened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Label PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          xs_label: size/xs
          xs_max_size: '30'
          s_label: size/sm
          s_max_size: '100'
          m_label: size/md
          m_max_size: '300'
          l_label: size/lg
          l_max_size: '800'
          xl_label: size/xl
          fail_if_xl: 'false'
          github_api_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog labels from checked checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const managed = new Set([
              "changelog:breaking",
              "changelog:feature",
              "changelog:fix",
              "changelog:performance",
              "changelog:docs",
              "changelog:internal",
            ]);

            const checked = new Set();
            const body = pr.body || "";
            const checkedPattern = /-\s*\[(x|X)\]\s*`([^`]+)`/g;
            let match;
            while ((match = checkedPattern.exec(body)) !== null) {
              const label = match[2].trim();
              if (managed.has(label)) checked.add(label);
            }

            const currentPrLabels = new Set(pr.labels.map((label) => label.name));
            const existingRepoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );
            const repoLabelSet = new Set(existingRepoLabels.map((label) => label.name));

            const toAdd = [...checked].filter(
              (label) => repoLabelSet.has(label) && !currentPrLabels.has(label)
            );
            const toRemove = [...managed].filter(
              (label) =>
                repoLabelSet.has(label) &&
                currentPrLabels.has(label) &&
                !checked.has(label)
            );

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: toAdd,
              });
            }

            for (const label of toRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label,
              });
            }

            core.info(`changelog labels added=[${toAdd.join(", ")}], removed=[${toRemove.join(", ")}]`);
