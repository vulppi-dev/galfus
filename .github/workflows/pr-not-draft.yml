name: PR Draft Guard

on:
  pull_request_target:
    branches:
      - main
      - stable/**
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read
  pull-requests: read

jobs:
  not-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR is not draft
        uses: actions/github-script@v7
        with:
          script: |
            const isDraft = context.payload.pull_request.draft;
            if (isDraft) {
              core.setFailed("PR is in Draft state. Mark as 'Ready for review' before merge.");
            }
