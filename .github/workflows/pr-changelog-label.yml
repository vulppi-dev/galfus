name: PR Changelog Label Check

on:
  pull_request_target:
    branches:
      - main
      - stable/**
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  require-changelog-label:
    runs-on: ubuntu-latest
    steps:
      - name: Validate changelog label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            const allowed = [
              "changelog:breaking",
              "changelog:feature",
              "changelog:fix",
              "changelog:performance",
              "changelog:docs",
              "changelog:internal",
            ];
            const hasAny = labels.some((name) => allowed.includes(name));

            if (!hasAny) {
              core.setFailed(
                "Missing changelog label. Add one of: " + allowed.join(", ")
              );
            }
