name: PR Promotion Source Check

on:
  pull_request_target:
    branches:
      - alpha/**
      - beta/**
      - release/**
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  promotion-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion source branch
        uses: actions/github-script@v7
        with:
          script: |
            const baseRef = context.payload.pull_request.base.ref;
            const headRef = context.payload.pull_request.head.ref;

            const baseAllowed = /^alpha\/.+$/.test(baseRef)
              || /^beta\/.+$/.test(baseRef)
              || /^release\/.+$/.test(baseRef);
            if (!baseAllowed) {
              core.setFailed(
                `Promotion rule misapplied: base branch "${baseRef}" is not alpha/*, beta/*, or release/*`
              );
              return;
            }

            const isMain = headRef === "main";
            const isStable = /^stable\/.+$/.test(headRef);

            if (!isMain && !isStable) {
              core.setFailed(
                `Invalid promotion source "${headRef}". Allowed sources: main or stable/*`
              );
              return;
            }

            core.info(`Promotion source valid: ${headRef} -> ${baseRef}`);
