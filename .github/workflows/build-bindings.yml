name: Build Bindings

on:
  push:
    branches:
      - "alpha/v*"
      - "beta/v*"
      - "release/v*"
  pull_request:
    branches:
      - "alpha/v*"
      - "beta/v*"
      - "release/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-tests:
    name: Quality Tests (Core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxkbcommon-dev libasound2-dev libdbus-1-dev libudev-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Static checks
        run: scripts/check.sh

  build:
    name: Build ${{ matrix.binding }} - ${{ matrix.os }}-${{ matrix.arch }}
    needs: quality-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]
        binding: [ffi, napi, python, lua]
        exclude:
          - os: ubuntu-latest
            arch: arm64
            binding: python
          - os: ubuntu-latest
            arch: arm64
            binding: lua
          - os: windows-latest
            arch: arm64
            binding: python
          - os: windows-latest
            arch: arm64
            binding: lua

    steps:
      - uses: actions/checkout@v4

      - name: Resolve channel and version
        id: meta
        shell: bash
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            REF_NAME="${GITHUB_BASE_REF}"
          fi

          if [[ "${REF_NAME}" =~ ^(alpha|beta|release)/v([0-9]+\.[0-9]+(\.[0-9]+)?)$ ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
            VERSION="v${BASH_REMATCH[2]}"
          else
            echo "Invalid branch format for publishing: ${REF_NAME}"
            exit 1
          fi

          echo "channel=${CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ (matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu') || (matrix.os == 'windows-latest' && matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc') || (matrix.os == 'macos-latest' && matrix.arch == 'arm64' && 'aarch64-apple-darwin') || (matrix.os == 'macos-latest' && matrix.arch == 'x64' && 'x86_64-apple-darwin') || (matrix.os == 'windows-latest' && matrix.arch == 'x64' && 'x86_64-pc-windows-msvc') || 'x86_64-unknown-linux-gnu' }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxkbcommon-dev libasound2-dev libdbus-1-dev libudev-dev libxcb-shape0-dev libxcb-xfixes0-dev
          if [ "${{ matrix.binding }}" == "lua" ]; then
            sudo apt-get install -y liblua5.4-dev
          fi
          if [ "${{ matrix.binding }}" == "python" ]; then
            sudo apt-get install -y python3-dev
          fi
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ "${{ matrix.binding }}" == "lua" ]; then
            brew install lua
          fi

      - name: Setup Node.js (for N-API)
        if: matrix.binding == 'napi'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for PyO3)
        if: matrix.binding == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ (matrix.arch == 'arm64' && 'arm64') || 'x64' }}

      - name: Build
        id: build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu') || 'x86_64-unknown-linux-gnu' }}"
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc') || 'x86_64-pc-windows-msvc' }}"
          else
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-apple-darwin') || 'x86_64-apple-darwin' }}"
          fi

          echo "target=${TARGET}" >> "${GITHUB_OUTPUT}"
          echo "Building target=${TARGET} binding=${{ matrix.binding }}"

          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.binding }}" == "python" || "${{ matrix.binding }}" == "lua" ]]; then
              export RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup"
            fi
          fi

          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then
            curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

            echo '[target.aarch64-unknown-linux-gnu]' > Cross.toml
            echo 'image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"' >> Cross.toml
            echo 'pre-build = ["dpkg --add-architecture arm64 && apt-get update && apt-get install -y libudev-dev:arm64 libasound2-dev:arm64"]' >> Cross.toml

            export PKG_CONFIG_ALLOW_CROSS=1
            cross build --release --target "${TARGET}" --no-default-features --features "${{ matrix.binding }}"
          else
            cargo build --release --target "${TARGET}" --no-default-features --features "${{ matrix.binding }}"
          fi

      - name: Package distributable
        id: package
        shell: bash
        run: |
          PLATFORM=""
          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="windows-x64"; fi
          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="windows-arm64"; fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="linux-x64"; fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="linux-arm64"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="macos-x64"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="macos-arm64"; fi

          if [[ -z "${PLATFORM}" ]]; then
            echo "Unable to resolve platform label"
            exit 1
          fi

          EXTENSION="so"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXTENSION="dll"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then EXTENSION="dylib"; fi

          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then
            SEARCH_PATH="target/aarch64-unknown-linux-gnu/release"
          else
            SEARCH_PATH="target/${{ steps.build.outputs.target }}/release"
          fi

          SOURCE_FILE="$(find "${SEARCH_PATH}" -maxdepth 1 -type f -name "*.${EXTENSION}" | head -n 1)"
          if [[ -z "${SOURCE_FILE}" ]]; then
            SOURCE_FILE="$(find target/release -maxdepth 1 -type f -name "*.${EXTENSION}" | head -n 1)"
          fi

          if [[ -z "${SOURCE_FILE}" ]]; then
            echo "No compiled library found for extension ${EXTENSION}"
            exit 1
          fi

          OUTPUT_NAME="vulfram_core.${EXTENSION}"
          if [[ "${{ matrix.binding }}" == "napi" ]]; then
            OUTPUT_NAME="vulfram_core.node"
          fi

          DIST_DIR="dist/${{ matrix.binding }}/${PLATFORM}"
          mkdir -p "${DIST_DIR}"

          DEST_PATH="${DIST_DIR}/${OUTPUT_NAME}"
          cp "${SOURCE_FILE}" "${DEST_PATH}"

          HASH=""
          if command -v sha256sum >/dev/null 2>&1; then
            HASH="$(sha256sum "${DEST_PATH}" | awk '{print $1}')"
          else
            HASH="$(shasum -a 256 "${DEST_PATH}" | awk '{print $1}')"
          fi

          echo "${HASH}" > "${DEST_PATH}.sha256"

          cat > "${DIST_DIR}/manifest.json" <<JSON
          {
            "channel": "${{ steps.meta.outputs.channel }}",
            "version": "${{ steps.meta.outputs.version }}",
            "binding": "${{ matrix.binding }}",
            "platform": "${PLATFORM}",
            "rust_target": "${{ steps.build.outputs.target }}",
            "artifact": "${OUTPUT_NAME}",
            "sha256": "${HASH}"
          }
          JSON

          echo "platform=${PLATFORM}" >> "${GITHUB_OUTPUT}"
          echo "dist_dir=${DIST_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload to Cloudflare R2
        if: github.event_name == 'push'
        shell: bash
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BASE_KEY="v1/${{ steps.meta.outputs.channel }}/${{ steps.meta.outputs.version }}/${{ matrix.binding }}/${{ steps.package.outputs.platform }}"
          aws s3 cp "${{ steps.package.outputs.dist_dir }}/" "s3://${R2_BUCKET}/${BASE_KEY}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive \
            --only-show-errors
          echo "Uploaded ${BASE_KEY}"

  build-wasm:
    name: Build wasm32-unknown-unknown
    needs: quality-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve channel and version
        id: meta
        shell: bash
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            REF_NAME="${GITHUB_BASE_REF}"
          fi

          if [[ "${REF_NAME}" =~ ^(alpha|beta|release)/v([0-9]+\.[0-9]+(\.[0-9]+)?)$ ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
            VERSION="v${BASH_REMATCH[2]}"
          else
            echo "Invalid branch format for publishing: ${REF_NAME}"
            exit 1
          fi

          echo "channel=${CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --version 0.2.114

      - name: Build
        run: cargo build --release --target wasm32-unknown-unknown --no-default-features --features wasm

      - name: Package distributable
        id: package
        shell: bash
        run: |
          DIST_DIR="dist/wasm/browser"
          mkdir -p "${DIST_DIR}"

          DEST_PATH="${DIST_DIR}/vulfram_core.wasm"
          wasm-bindgen \
            --target web \
            --out-dir "${DIST_DIR}" \
            --out-name vulfram_core \
            target/wasm32-unknown-unknown/release/vulfram_core.wasm

          HASH="$(sha256sum "${DEST_PATH}" | awk '{print $1}')"
          echo "${HASH}" > "${DEST_PATH}.sha256"

          cat > "${DIST_DIR}/manifest.json" <<JSON
          {
            "channel": "${{ steps.meta.outputs.channel }}",
            "version": "${{ steps.meta.outputs.version }}",
            "binding": "wasm",
            "platform": "browser",
            "rust_target": "wasm32-unknown-unknown",
            "artifact": "vulfram_core.wasm",
            "sha256": "${HASH}"
          }
          JSON

          echo "dist_dir=${DIST_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload to Cloudflare R2
        if: github.event_name == 'push'
        shell: bash
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BASE_KEY="v1/${{ steps.meta.outputs.channel }}/${{ steps.meta.outputs.version }}/wasm/browser"
          aws s3 cp "${{ steps.package.outputs.dist_dir }}/" "s3://${R2_BUCKET}/${BASE_KEY}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive \
            --only-show-errors
          echo "Uploaded ${BASE_KEY}"
