name: Build Bindings

on:
  push:
    branches:
      - 'alpha/v*'
      - 'beta/v*'
      - 'next/v*'
      - 'latest/v*'
  pull_request:
    branches:
      - 'alpha/v*'
      - 'beta/v*'
      - 'next/v*'
      - 'latest/v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  resolve-meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      artifactVersion: ${{ steps.meta.outputs.artifactVersion }}
      branchRef: ${{ steps.meta.outputs.branchRef }}
      channel: ${{ steps.meta.outputs.channel }}
      npmTag: ${{ steps.meta.outputs.npmTag }}
      packageVersion: ${{ steps.meta.outputs.packageVersion }}
      releaseTag: ${{ steps.meta.outputs.releaseTag }}
      versionCore: ${{ steps.meta.outputs.versionCore }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Resolve metadata
        id: meta
        run: bun run release-meta

  quality-tests:
    name: Quality Tests (Workspace)
    needs: resolve-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxkbcommon-dev libasound2-dev libdbus-1-dev libudev-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Static checks
        run: bun run check

      - name: Workspace tests
        run: cargo test --workspace --lib

  build-native:
    name: Build ${{ matrix.binding }} - ${{ matrix.os }}-${{ matrix.arch }}
    needs:
      - resolve-meta
      - quality-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]
        binding: [ffi, napi, python, lua]
        exclude:
          - os: ubuntu-latest
            arch: arm64
            binding: python
          - os: ubuntu-latest
            arch: arm64
            binding: lua
          - os: windows-latest
            arch: arm64
            binding: python
          - os: windows-latest
            arch: arm64
            binding: lua
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ (matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu') || (matrix.os == 'windows-latest' && matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc') || (matrix.os == 'macos-latest' && matrix.arch == 'arm64' && 'aarch64-apple-darwin') || (matrix.os == 'macos-latest' && matrix.arch == 'x64' && 'x86_64-apple-darwin') || (matrix.os == 'windows-latest' && matrix.arch == 'x64' && 'x86_64-pc-windows-msvc') || 'x86_64-unknown-linux-gnu' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Apply release version
        run: bun run version -- ${{ needs.resolve-meta.outputs.packageVersion }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxkbcommon-dev libasound2-dev libdbus-1-dev libudev-dev libxcb-shape0-dev libxcb-xfixes0-dev
          if [ "${{ matrix.binding }}" == "lua" ]; then
            sudo apt-get install -y liblua5.4-dev
          fi
          if [ "${{ matrix.binding }}" == "python" ]; then
            sudo apt-get install -y python3-dev
          fi
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ "${{ matrix.binding }}" == "lua" ]; then
            brew install lua
          fi

      - name: Setup Node.js (for N-API)
        if: matrix.binding == 'napi'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python (for PyO3)
        if: matrix.binding == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ (matrix.arch == 'arm64' && 'arm64') || 'x64' }}

      - name: Build
        id: build
        shell: bash
        run: |
          PACKAGE_NAME="vulfram-bindings-${{ matrix.binding }}"
          ARTIFACT_STEM="${PACKAGE_NAME//-/_}"

          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu') || 'x86_64-unknown-linux-gnu' }}"
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc') || 'x86_64-pc-windows-msvc' }}"
          else
            TARGET="${{ (matrix.arch == 'arm64' && 'aarch64-apple-darwin') || 'x86_64-apple-darwin' }}"
          fi

          echo "target=${TARGET}" >> "${GITHUB_OUTPUT}"
          echo "package_name=${PACKAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "artifact_stem=${ARTIFACT_STEM}" >> "${GITHUB_OUTPUT}"
          echo "Building target=${TARGET} binding=${{ matrix.binding }}"

          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.binding }}" == "python" || "${{ matrix.binding }}" == "lua" ]]; then
              export RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup"
            fi
          fi

          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then
            curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

            echo '[target.aarch64-unknown-linux-gnu]' > Cross.toml
            echo 'image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"' >> Cross.toml
            echo 'pre-build = ["dpkg --add-architecture arm64 && apt-get update && apt-get install -y libudev-dev:arm64 libasound2-dev:arm64"]' >> Cross.toml

            export PKG_CONFIG_ALLOW_CROSS=1
            cross build -p "${PACKAGE_NAME}" --release --target "${TARGET}"
          else
            cargo build -p "${PACKAGE_NAME}" --release --target "${TARGET}"
          fi

      - name: Package distributable
        id: package
        shell: bash
        run: |
          PLATFORM=""
          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="windows-x64"; fi
          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="windows-arm64"; fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="linux-x64"; fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="linux-arm64"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "x64" ]]; then PLATFORM="macos-x64"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "arm64" ]]; then PLATFORM="macos-arm64"; fi

          if [[ -z "${PLATFORM}" ]]; then
            echo "Unable to resolve platform label"
            exit 1
          fi

          EXTENSION="so"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXTENSION="dll"; fi
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then EXTENSION="dylib"; fi

          LIB_PREFIX="lib"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then LIB_PREFIX=""; fi

          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.arch }}" == "arm64" ]]; then
            SEARCH_PATH="build/cargo-target/aarch64-unknown-linux-gnu/release"
          else
            SEARCH_PATH="build/cargo-target/${{ steps.build.outputs.target }}/release"
          fi

          SOURCE_FILE="${SEARCH_PATH}/${LIB_PREFIX}${{ steps.build.outputs.artifact_stem }}.${EXTENSION}"
          if [[ ! -f "${SOURCE_FILE}" ]]; then
            SOURCE_FILE="build/cargo-target/release/${LIB_PREFIX}${{ steps.build.outputs.artifact_stem }}.${EXTENSION}"
          fi

          if [[ ! -f "${SOURCE_FILE}" ]]; then
            echo "No compiled library found at ${SOURCE_FILE}"
            exit 1
          fi

          OUTPUT_NAME="vulfram_core.${EXTENSION}"
          if [[ "${{ matrix.binding }}" == "napi" ]]; then
            OUTPUT_NAME="vulfram_core.node"
          fi

          DIST_DIR="dist/${{ matrix.binding }}/${PLATFORM}"
          mkdir -p "${DIST_DIR}"

          DEST_PATH="${DIST_DIR}/${OUTPUT_NAME}"
          cp "${SOURCE_FILE}" "${DEST_PATH}"

          HASH=""
          if command -v sha256sum >/dev/null 2>&1; then
            HASH="$(sha256sum "${DEST_PATH}" | awk '{print $1}')"
          else
            HASH="$(shasum -a 256 "${DEST_PATH}" | awk '{print $1}')"
          fi

          echo "${HASH}" > "${DEST_PATH}.sha256"

          cat > "${DIST_DIR}/manifest.json" <<JSON
          {
            "channel": "${{ needs.resolve-meta.outputs.channel }}",
            "version": "${{ needs.resolve-meta.outputs.packageVersion }}",
            "binding": "${{ matrix.binding }}",
            "platform": "${PLATFORM}",
            "rust_target": "${{ steps.build.outputs.target }}",
            "artifact": "${OUTPUT_NAME}",
            "sha256": "${HASH}"
          }
          JSON

          echo "platform=${PLATFORM}" >> "${GITHUB_OUTPUT}"
          echo "dist_dir=${DIST_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Upload raw artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-binding-${{ matrix.binding }}-${{ steps.package.outputs.platform }}
          path: ${{ steps.package.outputs.dist_dir }}
          if-no-files-found: error

  build-wasm:
    name: Build wasm32-unknown-unknown
    needs:
      - resolve-meta
      - quality-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Apply release version
        run: bun run version -- ${{ needs.resolve-meta.outputs.packageVersion }}

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --version 0.2.114

      - name: Build
        run: cargo build -p vulfram-bindings-wasm --release --target wasm32-unknown-unknown

      - name: Package distributable
        id: package
        shell: bash
        run: |
          DIST_DIR="dist/wasm/browser"
          mkdir -p "${DIST_DIR}"

          wasm-bindgen \
            --target web \
            --out-dir "${DIST_DIR}" \
            --out-name vulfram_core \
            build/cargo-target/wasm32-unknown-unknown/release/vulfram_bindings_wasm.wasm

          DEST_PATH="${DIST_DIR}/vulfram_core_bg.wasm"
          if [[ ! -f "${DEST_PATH}" ]]; then
            echo "Expected wasm output not found at ${DEST_PATH}"
            ls -la "${DIST_DIR}"
            exit 1
          fi

          HASH="$(sha256sum "${DEST_PATH}" | awk '{print $1}')"
          echo "${HASH}" > "${DEST_PATH}.sha256"

          cat > "${DIST_DIR}/manifest.json" <<JSON
          {
            "channel": "${{ needs.resolve-meta.outputs.channel }}",
            "version": "${{ needs.resolve-meta.outputs.packageVersion }}",
            "binding": "wasm",
            "platform": "browser",
            "rust_target": "wasm32-unknown-unknown",
            "artifact": "vulfram_core_bg.wasm",
            "sha256": "${HASH}"
          }
          JSON

          echo "dist_dir=${DIST_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Upload raw artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-binding-wasm-browser
          path: ${{ steps.package.outputs.dist_dir }}
          if-no-files-found: error

  package-bind-groups:
    name: Package Bind Groups
    needs:
      - resolve-meta
      - build-native
      - build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Download raw artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: raw-binding-*
          merge-multiple: false

      - name: Consolidate bind groups
        shell: bash
        run: |
          mkdir -p merged
          shopt -s nullglob

          for artifact_dir in dist/raw-binding-*; do
            BASENAME="$(basename "${artifact_dir}")"
            REST="${BASENAME#raw-binding-}"
            BINDING="${REST%%-*}"
            PLATFORM="${REST#${BINDING}-}"
            mkdir -p "merged/${BINDING}/${PLATFORM}"
            cp -R "${artifact_dir}/." "merged/${BINDING}/${PLATFORM}/"
          done

      - name: Build release archives
        shell: bash
        run: |
          mkdir -p release-assets

          for binding in ffi napi wasm python lua; do
            ARCHIVE="release-assets/vulfram-${binding}-${{ needs.resolve-meta.outputs.packageVersion }}.zip"
            (
              cd merged
              zip -rq "../${ARCHIVE}" "${binding}"
            )

            sha256sum "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"
          done

      - name: Upload grouped assets
        uses: actions/upload-artifact@v4
        with:
          name: release-bind-groups
          path: release-assets
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - resolve-meta
      - package-bind-groups
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-bind-groups
          path: release-assets

      - name: Resolve previous tag
        id: tags
        shell: bash
        run: |
          git fetch --tags --force
          CURRENT="${{ needs.resolve-meta.outputs.releaseTag }}"
          PREVIOUS="$(git tag --sort=-v:refname | grep -Fxv "${CURRENT}" | head -n 1 || true)"
          echo "previous=${PREVIOUS}" >> "${GITHUB_OUTPUT}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate release notes
        env:
          BRANCH_REF: ${{ needs.resolve-meta.outputs.branchRef }}
          CHANNEL: ${{ needs.resolve-meta.outputs.channel }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TAG: ${{ needs.resolve-meta.outputs.npmTag }}
          PACKAGE_VERSION: ${{ needs.resolve-meta.outputs.packageVersion }}
          PREVIOUS_TAG: ${{ steps.tags.outputs.previous }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.releaseTag }}
        run: bun scripts/github/generate-release-notes.ts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/*
          name: ${{ needs.resolve-meta.outputs.releaseTag }}
          prerelease: ${{ needs.resolve-meta.outputs.channel != 'latest' }}
          tag_name: ${{ needs.resolve-meta.outputs.releaseTag }}
          target_commitish: ${{ github.sha }}

  publish-npm-packages:
    name: Publish npm packages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - resolve-meta
      - publish-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Apply release version
        run: bun run version -- ${{ needs.resolve-meta.outputs.packageVersion }}

      - name: Download raw artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: raw-binding-*
          merge-multiple: false

      - name: Sync transport artifacts from workflow outputs
        shell: bash
        run: |
          clean_dir() {
            TARGET="$1"
            mkdir -p "${TARGET}"
            find "${TARGET}" -mindepth 1 ! -name '.gitkeep' -exec rm -rf {} +
          }

          clean_dir packages/transport-bun/dist
          clean_dir packages/transport-napi/dist
          clean_dir packages/transport-browser/dist

          shopt -s nullglob
          for artifact_dir in dist/raw-binding-*; do
            BASENAME="$(basename "${artifact_dir}")"
            REST="${BASENAME#raw-binding-}"
            BINDING="${REST%%-*}"
            PLATFORM="${REST#${BINDING}-}"

            if [[ "${BINDING}" == "ffi" ]]; then
              mkdir -p "packages/transport-bun/dist/${PLATFORM}"
              cp -R "${artifact_dir}/." "packages/transport-bun/dist/${PLATFORM}/"
              continue
            fi

            if [[ "${BINDING}" == "napi" ]]; then
              mkdir -p "packages/transport-napi/dist/${PLATFORM}"
              cp -R "${artifact_dir}/." "packages/transport-napi/dist/${PLATFORM}/"
              continue
            fi

            if [[ "${BINDING}" == "wasm" && "${PLATFORM}" == "browser" ]]; then
              cp -R "${artifact_dir}/." "packages/transport-browser/dist/"
            fi
          done

      - name: Bundle N-API transport package
        run: bun run build
        working-directory: packages/transport-napi

      - name: Publish npm packages
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.resolve-meta.outputs.packageVersion }}
          NPM_TAG: ${{ needs.resolve-meta.outputs.npmTag }}
        run: |
          npm_version_exists() {
            PACKAGE_NAME="$1"
            npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1
          }

          publish_if_needed() {
            PACKAGE_NAME="$(bun --print "require('./package.json').name")"

            if npm_version_exists "${PACKAGE_NAME}"; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; already published."
              return
            fi

            if npm publish --provenance --tag "${NPM_TAG}" --access public; then
              return
            fi

            if npm_version_exists "${PACKAGE_NAME}"; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; already published during this run."
              return
            fi

            echo "npm publish failed for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            exit 1
          }

          pushd packages/transport-browser >/dev/null
          publish_if_needed "packages/transport-browser"
          popd >/dev/null

          pushd packages/transport-bun >/dev/null
          publish_if_needed "packages/transport-bun"
          popd >/dev/null

          pushd packages/transport-napi >/dev/null
          publish_if_needed "packages/transport-napi"
          popd >/dev/null

          pushd packages/engine >/dev/null
          publish_if_needed "packages/engine"
          popd >/dev/null

          pushd packages/gltf-loader >/dev/null
          publish_if_needed "packages/gltf-loader"
          popd >/dev/null

          pushd packages/camera-control >/dev/null
          publish_if_needed "packages/camera-control"
          popd >/dev/null

  publish-jsr-packages:
    name: Publish JSR packages
    if: false
    # if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - resolve-meta
      - publish-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply release version
        run: bun run version -- ${{ needs.resolve-meta.outputs.packageVersion }}

      - name: Download raw artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: raw-binding-*
          merge-multiple: false

      - name: Sync browser transport artifacts from workflow outputs
        shell: bash
        run: |
          clean_dir() {
            TARGET="$1"
            mkdir -p "${TARGET}"
            find "${TARGET}" -mindepth 1 ! -name '.gitkeep' -exec rm -rf {} +
          }

          clean_dir packages/transport-browser/dist

          shopt -s nullglob
          for artifact_dir in dist/raw-binding-*; do
            BASENAME="$(basename "${artifact_dir}")"
            REST="${BASENAME#raw-binding-}"
            BINDING="${REST%%-*}"
            PLATFORM="${REST#${BINDING}-}"

            if [[ "${BINDING}" == "wasm" && "${PLATFORM}" == "browser" ]]; then
              cp -R "${artifact_dir}/." "packages/transport-browser/dist/"
            fi
          done

      - name: Publish JSR packages
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.resolve-meta.outputs.packageVersion }}
        run: |
          jsr_version_status() {
            PACKAGE_NAME="$1"
            curl -s -o /dev/null -w '%{http_code}' "https://jsr.io/${PACKAGE_NAME}/${PACKAGE_VERSION}_meta.json"
          }

          publish_jsr_package() {
            PACKAGE_NAME="$(bun --print "require('./jsr.json').name")"
            VERSION_STATUS="$(jsr_version_status "${PACKAGE_NAME}")"

            if [[ "${VERSION_STATUS}" == "200" ]]; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; already published."
              return
            fi

            if [[ "${VERSION_STATUS}" != "404" ]]; then
              echo "Unable to verify JSR version for ${PACKAGE_NAME}@${PACKAGE_VERSION}; HTTP ${VERSION_STATUS}."
              exit 1
            fi

            if npx jsr publish --allow-dirty; then
              return
            fi

            VERSION_STATUS="$(jsr_version_status "${PACKAGE_NAME}")"
            if [[ "${VERSION_STATUS}" == "200" ]]; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; already published during this run."
              return
            fi

            echo "JSR publish failed for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            exit 1
          }

          pushd packages/transport-types >/dev/null
          publish_jsr_package
          popd >/dev/null

          pushd packages/transport-browser >/dev/null
          publish_jsr_package
          popd >/dev/null

          pushd packages/engine >/dev/null
          publish_jsr_package
          popd >/dev/null

          pushd packages/gltf-loader >/dev/null
          publish_jsr_package
          popd >/dev/null

          pushd packages/camera-control >/dev/null
          publish_jsr_package
          popd >/dev/null
